title:
{
	eng: "Finnish Meteorological Institute's Open Data Download Service";
	fin: "Ilmatieteen laitoksen avoimen datan latauspalvelu";
};

abstract:
{
	eng: "Finnish Meteorological Institute's Open Data Download Service provides data free-of-charge for public use. The producers of open data are the Finnish Meteorological Institute, the Finnish Transport Agency, the Finnish Radiation and Nuclear Safety Authority and other data producers."
	fin: "Ilmatieteen laitoksen avoimen datan latauspalvelussa on saatavilla tietoaineistoja maksutta julkisen käyttöön. Tietoaineistoja latauspalveluun tuottavat Ilmatieteen laitos, Liikennevirasto, Säteilyturvakeskus ja muut tiedontuottajat."
};

